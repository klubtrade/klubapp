name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  javascript:
    name: JavaScript checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20.10.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check:critical
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  rust:
    name: Basis Vault checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --manifest-path programs/basis-vault/Cargo.toml -- --check
      # Quasar's account macro generates a positional constructor with one
      # argument per field, so only that generated-code lint is exempted.
      - run: cargo clippy --manifest-path programs/basis-vault/Cargo.toml --tests --features alloc -- -D warnings -A clippy::too-many-arguments
      - run: cargo test --manifest-path programs/basis-vault/Cargo.toml

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
