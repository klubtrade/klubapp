[build]
builder = "RAILPACK"
buildCommand = "npx --yes pnpm@9.12.0 --filter @klub/worker build"
watchPatterns = ["/apps/worker/**", "/packages/**", "/package.json", "/pnpm-lock.yaml", "/pnpm-workspace.yaml"]

[deploy]
startCommand = "npx --yes pnpm@9.12.0 --filter @klub/worker start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
