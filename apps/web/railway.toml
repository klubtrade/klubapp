[build]
builder = "RAILPACK"
buildCommand = "npx --yes pnpm@9.12.0 --filter @klub/web build"
watchPatterns = ["/apps/web/**", "/packages/**", "/package.json", "/pnpm-lock.yaml", "/pnpm-workspace.yaml"]

[deploy]
startCommand = "npx --yes pnpm@9.12.0 --filter @klub/web start"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
